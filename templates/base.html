<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}argonone{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#F4F5F9; --panel:#FFFFFF; --border:#DFE1EA; --text:#1B1E27; --muted:#5B6172;
  --accent:#6857E8; --accent-soft:#EDEAFB;
  --good:#2E9C63; --good-soft:#E4F6EC; --warn:#B5791C; --warn-soft:#FBF0DC; --crit:#C43450; --crit-soft:#FBE4E9;
  --shadow:0 1px 2px rgba(20,22,30,.06), 0 8px 24px rgba(20,22,30,.05);
  --font-ui:'IBM Plex Sans',-apple-system,"Segoe UI",sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
@media (prefers-color-scheme: dark){ :root{ --bg:#0C0E13; --panel:#14171F; --border:#262B36; --text:#E7E9F0; --muted:#8A90A3;
  --accent:#8B7FFF; --accent-soft:rgba(139,127,255,.14); --good:#4FBE86; --good-soft:rgba(79,190,134,.14);
  --warn:#E3A83F; --warn-soft:rgba(227,168,63,.14); --crit:#E5677A; --crit-soft:rgba(229,103,122,.14);
  --shadow:0 1px 2px rgba(0,0,0,.35), 0 8px 24px rgba(0,0,0,.4); } }
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-ui);}
a{color:var(--accent);}
/* Sitewide keyboard-focus affordance — pages with their own richer
   `:focus` treatment (e.g. an input's accent box-shadow ring) are more
   specific and keep winning; this just makes sure every other
   interactive element (buttons, plain links, nav items) shows a visible
   focus ring at all, which nothing previously provided. */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.center-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;}
.center-page .card{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:36px 32px 28px;}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.brand-mark{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-weight:600;font-size:14px;flex:none;}
.brand-name{font-weight:600;font-size:15px;letter-spacing:.01em;}
.brand-host{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
h1{font-size:21px;margin:0 0 8px;font-weight:700;}
.page-head{margin-bottom:6px;}
.lede{color:var(--muted);font-size:13.5px;line-height:1.55;margin:0 0 22px;}
.field{margin-bottom:16px;}
label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;}
input[type=text],input[type=password]{
  width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13.5px;outline:none;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.btn{padding:11px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;
  font-family:var(--font-ui);font-weight:600;font-size:14px;cursor:pointer;margin-top:6px;}
.btn:hover{filter:brightness(1.06);}
.btn.ghost{background:none;border:1px solid var(--border);color:var(--text);}
.center-page .btn{width:100%;}
.error{background:var(--crit-soft);color:var(--crit);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:16px;}
.notice{background:var(--good-soft);color:var(--good);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:16px;}
.note{color:var(--muted);font-size:12.5px;margin-top:18px;line-height:1.5;}

.shell{display:flex;min-height:100vh;}
.sidebar{width:220px;flex:none;background:var(--panel);border-right:1px solid var(--border);padding:20px 16px;display:flex;flex-direction:column;gap:4px;}
.sidebar nav{display:flex;flex-direction:column;gap:2px;margin-top:20px;flex:1;}
.sidebar a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:500;}
.sidebar nav svg{width:16px;height:16px;flex:none;}
.sidebar a:hover{background:var(--panel-2);color:var(--text);}
.sidebar a.active{background:var(--accent-soft);color:var(--accent);font-weight:600;}
.sidebar .divider{height:1px;background:var(--border);margin:10px 4px;}

.sidebar-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);position:relative;}
.account-row{display:flex;align-items:center;gap:9px;padding:6px;border-radius:8px;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:var(--font-ui);color:var(--text);}
.account-row:hover{background:var(--panel-2);}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:600;flex:none;}
.user-name{font-size:12.5px;font-weight:600;line-height:1.3;}
.user-role{font-family:var(--font-mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;}
.chevron{margin-left:auto;color:var(--muted);transition:transform .15s ease;}
.account-row[aria-expanded="true"] .chevron{transform:rotate(180deg);}
.account-menu{position:absolute;bottom:calc(100% + 6px);left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);padding:6px;display:none;flex-direction:column;gap:1px;}
.account-menu.open{display:flex;}
.account-menu a,.account-menu button{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:var(--text);text-decoration:none;font-size:12.5px;font-weight:500;background:none;border:none;font-family:var(--font-ui);cursor:pointer;text-align:left;width:100%;}
.account-menu a:hover,.account-menu button:hover{background:var(--panel-2);}
.account-menu svg{width:15px;height:15px;flex:none;color:var(--muted);}
.account-menu .danger:hover{color:var(--crit);}
.account-menu .danger:hover svg{color:var(--crit);}
main{flex:1;min-width:0;display:flex;flex-direction:column;}
.content{padding:24px 32px 64px;}
.status-strip{display:flex;flex-wrap:wrap;background:var(--panel);border-bottom:1px solid var(--border);}
.status-strip .stat{padding:13px 22px;border-right:1px solid var(--border);}
.status-strip .stat:last-child{border-right:none;}
.status-strip .stat-label{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.status-strip .stat-value{font-family:var(--font-mono);font-size:19px;font-weight:600;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:5px;}
.status-strip .stat-value .unit{font-size:12px;color:var(--muted);font-weight:500;}
/* Fixed-width trend slot (not variable "· ramping" text) so the Fan
   column's width never shifts as the fan catches up to the curve's
   target — reserved via `visibility`, not `display`, so the box always
   takes up the same space whether or not a trend is currently shown. */
.status-strip .stat-value .trend{display:inline-block;width:11px;text-align:center;font-size:13px;line-height:1;font-weight:700;}
.status-strip .stat-value .trend.steady{visibility:hidden;}
.status-strip .stat-value .trend.up{color:var(--accent);}
.status-strip .stat-value .trend.down{color:var(--muted);}
.status-strip .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px;background:var(--good);position:relative;}
.status-strip .dot.warn{background:var(--warn);}
.status-strip .dot.crit{background:var(--crit);}
.status-strip .dot.live::after{content:'';position:absolute;inset:-4px;border-radius:50%;background:inherit;opacity:.5;}
.role-badge{display:inline-block;background:var(--accent-soft);color:var(--accent);border-radius:6px;padding:2px 8px;font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em;}
.toast{position:fixed;bottom:22px;right:22px;background:var(--panel);border:1px solid var(--border);border-radius:10px;
  box-shadow:var(--shadow);padding:11px 16px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px;
  transform:translateY(12px);opacity:0;pointer-events:none;transition:transform .25s cubic-bezier(.16,1,.3,1), opacity .25s ease;z-index:20;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--good);flex:none;}

/* Matches the mockups' shared motion language (`03-dashboard.html` etc.)
   — entrance stagger, a pulsing "live" status dot, and a brief value
   flash on update — gated behind prefers-reduced-motion like every
   mockup gates it, so it's opt-out for anyone who's asked the OS for
   less motion, not just opt-in. */
@media (prefers-reduced-motion: no-preference){
  .status-strip .dot.live{animation:pulseDot 2.2s ease-in-out infinite;}
  .status-strip .dot.live::after{animation:pulseRing 2.2s ease-out infinite;}
  .flash{animation:flash .5s ease;}
  .fade-up{opacity:0;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) forwards;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.2);opacity:0}}
@keyframes flash{0%{color:var(--accent)}100%{color:inherit}}
</style>
</head>
<body>
{% block body %}{% endblock %}
<script src="/static/htmx.min.js"></script>
<script src="/static/htmx-ext-ws.js"></script>
</body>
</html>
