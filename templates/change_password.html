{% extends "base.html" %}
{% block title %}Change password — argonone{% endblock %}
{% block body %}
<div class="center-page">
  <div class="card">
    <div class="brand">
      <div class="brand-mark">A</div>
      <div class="brand-name">argonone</div>
    </div>
    <h1>Set a new password</h1>
    <p class="lede">An administrator reset your password. Choose a new one to continue.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/account/change-password">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8" autofocus>
      </div>
      <div class="field">
        <label for="password_confirm">Confirm new password</label>
        <input type="password" id="password_confirm" name="password_confirm" autocomplete="new-password" required minlength="8">
      </div>
      <button type="submit" class="btn">Set password</button>
    </form>
  </div>
</div>
{% endblock %}
