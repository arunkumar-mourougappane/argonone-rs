name: CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Formatting check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy (lint)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Business-logic tests, on the native host target — not the Pi target,
  # since the Pi build is cross-compiled and this runner can't execute
  # aarch64 test binaries. Hardware I/O (I2C/GPIO) sits behind the
  # HardwareBackend trait specifically so the rest is unit-testable here;
  # see docs/research-rust-backend-webui.md §2.9 for why this job exists —
  # without it, nothing blocking in CI ran `cargo test` at all.
  test:
    name: Unit tests (host)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --locked --all

  # RustSec advisory-database check against Cargo.lock. See
  # docs/research-rust-backend-webui.md §2.9 — added because auth-relevant
  # crate choices (argon2, tower-sessions, axum-login) warrant it, and
  # nothing was checking for known vulnerabilities before this.
  audit:
    name: Dependency audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Primary target: Raspberry Pi running Ubuntu Server 26.04 LTS (aarch64) —
  # see docs/research-auth-persistence-service.md for why. Cross-compiled
  # from an x86_64 runner rather than relying on a native arm64 runner
  # being available. This job blocks CI on failure.
  build-raspberry-pi:
    name: Build (aarch64 — Raspberry Pi)
    runs-on: ubuntu-latest
    needs: [clippy, test, audit]
    steps:
      - uses: actions/checkout@v6

      - name: Install aarch64 cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-unknown-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu
        # Note: unit tests aren't run here — the resulting binary is aarch64
        # and this runner can't execute it without QEMU emulation. Real test
        # coverage for this target runs on-device or via a self-hosted
        # arm64 runner if one gets added later.

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: argonone-rs-aarch64-linux
          path: target/aarch64-unknown-linux-gnu/release/argonone-rs
          if-no-files-found: error

  # Secondary target: macOS (developer workstation). Not a deploy target —
  # this only exists so day-to-day dev on macOS doesn't silently bit-rot.
  # Non-blocking: a macOS-only failure shouldn't fail CI for a Pi daemon.
  build-macos:
    name: Build (macOS, secondary)
    runs-on: macos-latest
    needs: clippy
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Run unit tests
        run: cargo test --locked --all

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: argonone-rs-macos
          path: target/release/argonone-rs
          if-no-files-found: error
